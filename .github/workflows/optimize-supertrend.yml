name: Optimize SuperTrend Parameters

on:
  schedule:
    # First Sunday of each month at 02:00 UTC
    - cron: "0 2 1-7 * 0"
  workflow_dispatch:   # manual trigger via UI or "⚡ OPTIMIZE ST" button

permissions:
  contents: write

jobs:
  optimize:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Pull latest changes
        run: git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install yfinance pandas numpy

      - name: Run SuperTrend optimizer
        run: python scripts/optimize_supertrend.py

      - name: Commit updated cache
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update SuperTrend parameter cache"
          file_pattern: "st_params.json"
