name: Daily Portfolio Analysis & Alerts

on:
  schedule:
    # 8:55am HKT Mon–Sat  (HKT = UTC+8 → 00:55 UTC)
    - cron: '55 0 * * 1-6'
    # 4:30pm HKT Mon–Fri  (HKT = UTC+8 → 08:30 UTC)
    - cron: '30 8 * * 1-5'
  workflow_dispatch: {}     # manual trigger for testing

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger analysis and send alerts
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          response=$(curl -sf --max-time 90 \
            -X POST "https://stock-analysis-technical-and-fundam.vercel.app/api/cron/analyze" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${CRON_SECRET}" \
            -d '{}' \
            || echo '{"ok":false,"error":"curl failed"}')

          echo "Response: $response"

          skipped=$(echo "$response" | jq -r '.skipped // false')
          ok=$(echo "$response"      | jq -r '.ok // false')

          if [ "$skipped" = "true" ]; then
            echo "No signals today — Telegram skipped."
            exit 0
          fi

          if [ "$ok" = "true" ]; then
            echo "Telegram alert sent successfully."
          else
            echo "Telegram send failed: $(echo "$response" | jq -r '.error // "unknown"')"
            exit 1
          fi
