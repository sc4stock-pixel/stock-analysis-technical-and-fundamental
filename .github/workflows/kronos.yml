name: Kronos Forecasts

on:
  schedule:
    - cron: "30 22 * * *"   # 30 min after TimesFM (0 22) to avoid push races
  workflow_dispatch:

permissions:
  contents: write

jobs:
  forecast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: kronos-hf-${{ runner.os }}

      - name: Clone Kronos model code
        run: git clone --depth 1 https://github.com/shiyu-coder/Kronos.git ./Kronos

      - name: Install dependencies
        run: |
          pip install "numpy<2"
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install einops huggingface_hub safetensors tqdm pandas yfinance

      - name: Run predictor
        run: python scripts/kronos_predict.py

      - name: Rebase on latest main (avoid concurrent-push races)
        run: git pull --rebase --autostash origin main || true

      - name: Commit updated JSON
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Update Kronos forecasts"
          file_pattern: "kronos_forecasts.json"

      - name: Update forecast_skill.json
        run: |
          python3 scripts/forecast_probation_audit.py --emit-skill-json forecast_skill.json
          if ! git diff --quiet forecast_skill.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add forecast_skill.json
            git commit -m "Update forecast_skill from probation audit"
            git push
          fi
