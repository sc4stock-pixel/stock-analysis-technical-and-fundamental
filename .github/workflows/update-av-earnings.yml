name: Update Alpha Vantage Earnings Cache

on:
  schedule:
    - cron: '0 5 * * 0'   # Every Sunday 05:00 UTC (quarterly data only changes 4x/year)
  workflow_dispatch:        # Allow manual trigger from GitHub Actions UI

jobs:
  update-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install akshare pandas requests --quiet

      - name: Fetch quarterly earnings from Alpha Vantage
        env:
          AV_KEY: ${{ secrets.AV_KEY }}
        run: python scripts/fetch_av_earnings.py

      - name: Commit and push cache file
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add av_earnings_cache.json
          git diff --staged --quiet || git commit -m "chore: update Alpha Vantage earnings cache"
          git push
