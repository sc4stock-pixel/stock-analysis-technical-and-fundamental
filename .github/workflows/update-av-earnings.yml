name: Update Alpha Vantage Earnings + Fundamentals Cache

on:
  schedule:
    - cron: '0 5 * * 0'   # Every Sunday 05:00 UTC
  workflow_dispatch:

jobs:
  update-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install akshare pandas requests yfinance --quiet

      - name: Fetch quarterly EPS (existing)
        env:
          AV_KEY: ${{ secrets.AV_KEY }}
        run: python scripts/fetch_av_earnings.py

      - name: Fetch quarterly fundamentals (new)
        env:
          AV_KEY: ${{ secrets.AV_KEY }}
        run: python scripts/fetch_fundamentals.py

      - name: Commit and push cache files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add av_earnings_cache.json fundamentals_cache.json
          git diff --staged --quiet || git commit -m "chore: update earnings + fundamentals caches"
          git pull --rebase --autostash origin main
          git push
