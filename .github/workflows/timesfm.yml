name: TimesFM Price Targets

on:
  schedule:
    - cron: "30 08,10,12,16 * * *"   # daily after market close (UTC)
      timezone: 'Asia/Hong_Kong' # Added functionality
  workflow_dispatch:        # manual trigger

permissions:
  contents: write

jobs:
  forecast:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Pull latest changes
        run: git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install git+https://github.com/google-research/timesfm.git
          pip install yfinance

      - name: Run predictor
        run: python scripts/timesfm_predict.py

      - name: Rebase on latest main (avoid concurrent-push races)
        run: git pull --rebase --autostash origin main || true

      - name: Commit updated JSON
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Update TimesFM price targets"
          file_pattern: "timesfm_forecasts.json"
