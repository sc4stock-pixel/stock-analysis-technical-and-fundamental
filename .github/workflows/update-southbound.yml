name: Update Southbound JSON

on:
  schedule:
    - cron: '00 17 * * *'      # runs daily at 23:00 UTC (market close)
  workflow_dispatch:           # allows manual trigger from Actions tab

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5 

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install akshare

      - name: Generate southbound data
        run: |
          cat << 'EOF' > /tmp/southbound.py
          import json, akshare as ak
          df = ak.stock_hsgt_fund_flow_summary_em()
          south = df[df['资金方向'] == '南向']
          total = 0.0
          for _, row in south.iterrows():
              val = row.get('成交净买额', 0)
              if isinstance(val, (int, float)):
                  total += val
          with open('southbound_data.json', 'w', encoding='utf-8') as f:
              json.dump({'todayYi': round(total, 2)}, f, ensure_ascii=False)
          print(f"Exported: totalYi = {round(total, 2)}")
          EOF
          python /tmp/southbound.py

      - name: Commit updated JSON
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Update southbound data"
          file_pattern: 'southbound_data.json'
