name: Update Southbound JSON
on:
  schedule:
    - cron: '20 10 * * *'   # runs daily at 23:00 UTC (market close) mm hh dom mm dow
  workflow_dispatch:        # allows manual trigger
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install akshare
      - run: python -c "
        import json, akshare as ak;
        df = ak.stock_hsgt_fund_flow_summary_em();
        south = df[df['资金方向'] == '南向'];
        total = sum(float(row.get('成交净买额',0)) for _,row in south.iterrows() if isinstance(row.get('成交净买额'),(int,float)));
        with open('southbound_data.json','w') as f: json.dump({'todayYi':round(total,2)},f)
        "
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update southbound data"
          file_pattern: 'southbound_data.json'
