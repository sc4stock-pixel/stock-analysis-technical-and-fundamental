name: Probe HK Cash Flow

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install akshare pandas --quiet
      - run: python scripts/probe_hk_cf.py
