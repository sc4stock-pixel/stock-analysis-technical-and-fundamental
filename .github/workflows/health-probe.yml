name: Pipeline Health Probe
on:
  schedule:
    - cron: '0 4 * * 1-5'   # ~12:00 HKT, well before the HK report window (GHA delay-tolerant)
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe /api/health and alert on failure
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID_ALERTS }}
        run: |
          body=$(curl -s --max-time 40 -H "x-cron-secret: ${CRON_SECRET}" \
            "https://stock-analysis-technical-and-fundam.vercel.app/api/health")
          echo "health: $body"
          ok=$(echo "$body" | jq -r '.ok // false')
          if [ "$ok" != "true" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT}" --data-urlencode "text=🚑 HEALTH FAIL: ${body}" >/dev/null
            exit 1
          fi

      - name: Probe /api/freshness and alert on stale data
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID_ALERTS }}
        run: |
          body=$(curl -s --max-time 50 -H "x-cron-secret: ${CRON_SECRET}" \
            "https://stock-analysis-technical-and-fundam.vercel.app/api/freshness")
          echo "freshness: $body"
          stale=$(echo "$body" | jq -r '(.stale // []) | length' 2>/dev/null || echo "ERR")
          if [ "$stale" = "ERR" ] || [ -z "$stale" ]; then
            # The sentinel itself failed — alert rather than let staleness go undetected.
            curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT}" --data-urlencode "text=🚑 FRESHNESS PROBE ERROR: ${body}" >/dev/null
          elif [ "$stale" -gt 0 ]; then
            lines=$(echo "$body" | jq -r '.items[] | select(.stale) | "• \(.artifact): \(.detail)"')
            msg=$(printf '⏳ STALE DATA (%s):\n%s' "$stale" "$lines")
            curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT}" --data-urlencode "text=${msg}" >/dev/null
          fi
